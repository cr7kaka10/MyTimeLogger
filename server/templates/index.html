<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyTimeLogger | Sleep Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f1a;
      --card: rgba(17, 25, 40, 0.75);
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.5);
      --secondary: #94a3b8;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent-orange: #f59e0b;
      --accent-purple: #a855f7;
      --accent-blue: #38bdf8;
      --border: rgba(255, 255, 255, 0.08);
      --glass: rgba(255, 255, 255, 0.03);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      background-image: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1), transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(245, 158, 11, 0.05), transparent 40%);
    }
    main { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    
    .card {
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    button {
      background: var(--primary); color: white; border: none; padding: 14px 24px;
      border-radius: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 15px var(--primary-glow);
      font-size: 14px;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); filter: brightness(1.1); }
    button.secondary { 
      background: var(--glass); color: white; border: 1px solid var(--border); 
      box-shadow: none; backdrop-filter: blur(8px);
    }
    button.secondary:hover { background: rgba(255,255,255,0.08); }

    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .date-nav { display: flex; align-items: center; gap: 20px; background: var(--glass); padding: 10px 24px; border-radius: 100px; border: 1px solid var(--border); }
    .date-nav b { font-size: 20px; font-weight: 800; min-width: 140px; text-align: center; color: var(--primary); }
    .date-nav span { cursor: pointer; opacity: 0.5; font-size: 20px; transition: 0.2s; }
    .date-nav span:hover { opacity: 1; transform: scale(1.2); }

    .big-score { text-align: right; }
    .big-score div { font-size: 80px; font-weight: 900; line-height: 1; background: linear-gradient(135deg, #fff 0%, #6366f1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .big-score span { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 3px; font-weight: 800; }

    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .metric-item {
      background: var(--glass); padding: 24px; border-radius: 24px; border: 1px solid var(--border);
      transition: 0.3s; position: relative;
    }
    .metric-item:hover { background: rgba(255,255,255,0.06); transform: translateY(-4px); }
    .metric-item.priority { border-left: 5px solid var(--accent-orange); background: rgba(245, 158, 11, 0.05); }
    .metric-item label { display: block; font-size: 12px; color: var(--text-muted); font-weight: 700; margin-bottom: 10px; }
    .metric-item b { font-size: 24px; font-weight: 800; color: #fff; }
    .metric-item .unit { font-size: 13px; color: var(--text-muted); margin-left: 4px; font-weight: 400; }

    .action-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 50px; }
    @media (max-width: 800px) { .action-bar { grid-template-columns: repeat(2, 1fr); } }

    .layout-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px; }
    @media (max-width: 1000px) { .layout-grid { grid-template-columns: 1fr; } }

    .report-card { background: var(--glass); border-radius: 32px; padding: 40px; border: 1px solid var(--border); }
    .analysis-html h1, .analysis-html h2 { margin: 30px 0 15px; color: var(--primary); font-size: 22px; }
    .analysis-html p { margin-bottom: 15px; color: #cbd5e1; }
    .analysis-html table { width: 100%; border-collapse: collapse; margin: 20px 0; border-radius: 16px; overflow: hidden; }
    .analysis-html td, .analysis-html th { padding: 14px; border: 1px solid rgba(255,255,255,0.05); }
    .analysis-html th { background: rgba(255,255,255,0.03); text-align: left; font-weight: 700; }

    textarea { 
      width: 100%; height: 140px; background: rgba(15,23,42,0.5); border: 1px solid var(--border);
      border-radius: 20px; color: #fff; padding: 20px; font-family: inherit; font-size: 15px;
      outline: none; resize: none; transition: 0.3s;
    }
    textarea:focus { border-color: var(--primary); background: rgba(15,23,42,0.8); box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }

    .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
    .user-tag { background: var(--glass); padding: 8px 20px; border-radius: 100px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); }
    .avatar { width: 32px; height: 32px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }
    
    #statusInfo { 
      padding: 16px; border-radius: 16px; background: rgba(99, 102, 241, 0.1); 
      border: 1px solid var(--primary); color: #a5b4fc; margin-bottom: 30px; 
      display: none; text-align: center; font-weight: 600;
    }

    .auth-card { max-width: 420px; margin: 120px auto; padding: 48px; border-radius: 40px; text-align: center; }
    .auth-card input { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--border); background: rgba(15,23,42,0.6); color: #fff; margin-bottom: 16px; outline: none; }
    .auth-card input:focus { border-color: var(--primary); }
  </style>
</head>
<body>
<main>
  <div id="authPanel" class="auth-card card">
    <div style="font-size: 48px; margin-bottom: 20px;">🌙</div>
    <h2 id="authTitle" style="font-size: 32px; color: #fff; background: none; -webkit-text-fill-color: initial; margin-bottom: 12px;">睡眠分析云端</h2>
    <p class="muted" id="authDesc">登录以同步您的 MyTimeLogger 数据</p>
    <input id="username" placeholder="用户名" />
    <input id="password" type="password" placeholder="密码" />
    <button onclick="doAuth()" id="authBtn">进入系统</button>
    <button class="secondary" onclick="toggleAuth()" id="toggleBtn" style="margin-top: 10px;">没有账号？立即注册</button>
  </div>

  <div id="mainPanel" style="display:none">
    <div class="top-nav">
      <div class="user-tag">
        <div class="avatar" id="avatarLetter">U</div>
        <div style="font-size: 14px; font-weight: 700;" id="displayUser">--</div>
      </div>
      <div style="display: flex; gap: 12px;">
        <button class="secondary" style="padding: 10px 20px; border-radius: 100px; font-size: 13px;" onclick="recent()">最近记录</button>
        <button class="secondary" style="padding: 10px 20px; border-radius: 100px; font-size: 13px; color: #f87171;" onclick="logout()">退出</button>
      </div>
    </div>

    <div class="dashboard-header">
      <div>
        <span style="font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 2px;">Data Visualization</span>
        <div class="date-nav" style="margin-top: 10px;">
          <span onclick="changeDate(-1)">❮</span>
          <b id="dateDisplay">----/--/--</b>
          <span onclick="changeDate(1)">❯</span>
        </div>
      </div>
      <div class="big-score">
        <span>Sleep Score</span>
        <div id="bigScore">--</div>
      </div>
    </div>

    <div class="metrics-grid" id="metricsGrid">
      <div class="metric-item priority"><label>🔥 睡眠周期</label><b id="m_cycles">--</b><span class="unit">次</span></div>
      <div class="metric-item priority"><label>🔥 深睡时长</label><b id="m_deep_min">--</b><span class="unit">min</span></div>
      <div class="metric-item"><label>✨ 入睡用时</label><b id="m_fall_min">--</b><span class="unit">min</span></div>
      <div class="metric-item"><label>🌅 起床用时</label><b id="m_wake_min">--</b><span class="unit">min</span></div>
      <div class="metric-item"><label>👀 清醒次数</label><b id="m_awake_count">--</b><span class="unit">次</span></div>
      <div class="metric-item"><label>🌑 清醒时长</label><b id="m_awake_min">--</b><span class="unit">min</span></div>
      <div class="metric-item"><label>💤 深睡比例</label><b id="m_deep_pct">--</b><span class="unit">%</span></div>
      <div class="metric-item"><label>📈 睡眠连续性</label><b id="m_continuity">--</b><span class="unit">分</span></div>
      <div class="metric-item"><label>🫁 呼吸质量</label><b id="m_breathing">--</b><span class="unit">分</span></div>
      <div class="metric-item"><label>☁️ 浅睡时长</label><b id="m_light_min">--</b><span class="unit">min</span></div>
      <div class="metric-item"><label>🌀 快速眼动</label><b id="m_rem_min">--</b><span class="unit">min</span></div>
      <div class="metric-item"><label>⌛ 总时长</label><b id="m_total_min">--</b><span class="unit">min</span></div>
    </div>

    <div class="action-bar">
      <input id="file" type="file" accept="image/*" style="display:none" onchange="upload()" />
      <button onclick="document.getElementById('file').click()">📸 上传图片</button>
      <button class="secondary" onclick="analyzeMode(false)">💤 睡眠分析</button>
      <button class="secondary" onclick="analyzeMode(true)">📄 完整分析</button>
      <button class="secondary" onclick="forceRefresh()">🔄 强制刷新</button>
    </div>

    <div id="statusInfo"></div>

    <div class="layout-grid" id="contentArea" style="display: none;">
      <div class="report-card">
        <div id="result" class="analysis-html"></div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 30px;">
        <div class="card" id="morningDiaryBox" style="border-radius: 32px; background: rgba(245, 158, 11, 0.05); border-left: 8px solid var(--accent-orange);">
          <h3 style="margin-bottom: 20px; font-size: 18px; color: var(--accent-orange); display: flex; align-items: center; gap: 10px;">☀️ 晨间感悟</h3>
          <textarea id="morningDiaryText" placeholder="写下梦境或早起的瞬间想法..."></textarea>
          <button id="saveMorningBtn" style="margin-top: 15px; width: auto; background: var(--accent-orange); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);" onclick="saveMorningDiary()">保存晨间日记</button>
        </div>
        <div class="card" id="eveningDiaryBox" style="border-radius: 32px; background: rgba(168, 85, 247, 0.05); border-left: 8px solid var(--accent-purple); display: none;">
          <h3 style="margin-bottom: 20px; font-size: 18px; color: var(--accent-purple); display: flex; align-items: center; gap: 10px;">🌙 晚间复盘</h3>
          <textarea id="eveningDiaryText" placeholder="总结今天的收获，或者对明天的期待..."></textarea>
          <button id="saveEveningBtn" style="margin-top: 15px; width: auto; background: var(--accent-purple); box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);" onclick="saveEveningDiary()">保存晚间复盘</button>
        </div>
      </div>
    </div>
  </div>
</main>
<script>
  let isLogin = true;
  let token = localStorage.getItem('sleep_token');
  let currentViewDate = new Date().toISOString().split('T')[0];
  let recentDataCache = [];
  
  async function init() {
    if(token) {
      const r = await fetch('/auth/me', {headers:{'Authorization':`Bearer ${token}`}});
      if(r.ok) {
        const j = await r.json();
        showMain(j.user);
      } else { logout(); }
    } else { showAuth(); }
  }

  function showAuth() {
    authPanel.style.display = 'block';
    mainPanel.style.display = 'none';
  }

  function showMain(user) {
    authPanel.style.display = 'none';
    mainPanel.style.display = 'block';
    displayUser.innerText = user.username;
    avatarLetter.innerText = user.username[0].toUpperCase();
    fetchByDate(currentViewDate);
  }

  function logout() {
    localStorage.removeItem('sleep_token');
    location.reload();
  }

  function toggleAuth() {
    isLogin = !isLogin;
    authTitle.innerText = isLogin ? '睡眠分析云端' : '开启您的睡眠之旅';
    authBtn.innerText = isLogin ? '进入系统' : '立即注册';
    toggleBtn.innerText = isLogin ? '还没有账号？立即注册' : '已有账号？返回登录';
  }

  async function doAuth() {
    const u = username.value, p = password.value;
    const path = isLogin ? '/auth/login' : '/auth/register';
    const r = await fetch(path, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username:u, password:p})
    });
    const j = await r.json();
    if(r.ok) {
      if(isLogin) {
        localStorage.setItem('sleep_token', j.token);
        showMain({username: u});
      } else { alert('注册成功，请登录'); toggleAuth(); }
    } else { alert(j.detail || '操作失败'); }
  }

  async function upload() {
    const f = document.getElementById('file').files[0];
    if(!f) return;
    const fd = new FormData(); fd.append('file', f);
    statusInfo.style.display = 'block';
    statusInfo.innerText = '🚀 正在上传并启动快速睡眠分析...';
    const r = await fetch('/upload', {
      method:'POST', 
      headers:{'Authorization':`Bearer ${token}`},
      body:fd
    });
    const j = await r.json();
    if(r.ok) poll(j.request_id);
  }

  async function poll(rid) {
    try {
      const r = await fetch(`/status/${rid}`, {headers:{'Authorization':`Bearer ${token}`}});
      const j = await r.json();
      if(j.status === 'done') {
        statusInfo.innerText = '✅ 分析完成！';
        setTimeout(()=>statusInfo.style.display='none', 2000);
        render(j.result || {});
        return;
      }
      if(j.status === 'error') { statusInfo.innerText = '❌ 出错: ' + (j.error || '分析失败'); return; }
      statusInfo.innerText = '⏳ AI 正在提取数据...';
      setTimeout(()=>poll(rid), 2500);
    } catch (err) { console.error(err); }
  }

  async function recent(){
    const r = await fetch('/recent?limit=15', {headers:{'Authorization':`Bearer ${token}`}});
    const j = await r.json();
    recentDataCache = j.data || [];
    result.innerHTML = '<div style="margin-top:20px">' + recentDataCache.map((x, i)=>`
      <div style="padding:16px; border-radius:16px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); cursor:pointer; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;" onclick="renderFromCache(${i})">
        <div>
            <span style="font-weight:700; color:var(--primary)">${x.date}</span> · 
            <span style="color:#fff">${x.result?.sleep_score || '--'} 分</span>
        </div>
        ${x.result?.analysis_html ? '<span style="font-size:10px; color:#10b981; padding:2px 8px; background:rgba(16,185,129,0.1); border-radius:100px;">REPORT READY</span>' : ''}
      </div>
    `).join('') + '</div>';
    contentArea.style.display = 'block';
    morningDiaryBox.style.display = 'none';
    eveningDiaryBox.style.display = 'none';
  }

  function renderFromCache(index){
    const item = recentDataCache[index];
    if(item && item.result) render(item.result);
  }

  function render(d){
    currentViewDate = d.date || d.sleep_date;
    dateDisplay.innerText = currentViewDate;
    contentArea.style.display = 'grid';
    
    // Populate Metrics
    bigScore.innerText = d.sleep_score || '--';
    m_cycles.innerText = d.sleep_cycles || '--';
    m_deep_min.innerText = d.deep_sleep_min || '--';
    m_fall_min.innerText = d.fall_asleep_min || '--';
    m_wake_min.innerText = d.wake_up_min || '--';
    m_awake_count.innerText = d.awake_count || '--';
    m_awake_min.innerText = d.awake_min || '--';
    m_deep_pct.innerText = d.deep_sleep_ratio || '--';
    m_continuity.innerText = d.sleep_continuity || '--';
    m_breathing.innerText = d.breathing_score || '--';
    m_light_min.innerText = d.light_sleep_min || '--';
    m_rem_min.innerText = d.rem_sleep_min || '--';
    m_total_min.innerText = d.total_sleep_min || '--';

    morningDiaryBox.style.display = 'block';
    morningDiaryText.value = d.sleep_reflection || '';
    
    if(d.analysis_html) {
      eveningDiaryBox.style.display = 'block';
      eveningDiaryText.value = d.evening_diary || '';
    } else {
      eveningDiaryBox.style.display = 'none';
    }

    result.innerHTML = d.analysis_html || '<p style="color:var(--text-muted);text-align:center;padding:40px">暂无深度建议，请上传截图启动 AI 复盘</p>';
  }

  function changeDate(days) {
    const d = new Date(currentViewDate);
    d.setDate(d.getDate() + days);
    currentViewDate = d.toISOString().split('T')[0];
    fetchByDate(currentViewDate);
  }

  async function fetchByDate(date) {
    statusInfo.style.display = 'block';
    statusInfo.innerText = `正在读取 ${date} 的分析数据...`;
    try {
      const r = await fetch(`/status_by_date/${date}`, {headers: {'Authorization':`Bearer ${token}`}});
      const j = await r.json();
      if(r.ok) {
        statusInfo.style.display = 'none';
        render(j.result || {date});
      } else {
        statusInfo.innerText = `⚠️ ${date} 暂无云端数据记录`;
        render({date});
      }
    } catch(err) { statusInfo.innerText = '网络连接异常'; }
  }

  function forceRefresh() {
    fetchByDate(currentViewDate);
  }

  async function analyzeMode(full){
    const date = currentViewDate;
    statusInfo.style.display = 'block';
    statusInfo.innerText = full ? '🔮 正在调起 AI 进行深度复盘并生成完整报告...' : '💤 正在进行快速睡眠指标分析...';
    try {
      const r = await fetch('/generate_report', {
        method: 'POST',
        headers: {'Authorization':`Bearer ${token}`, 'Content-Type':'application/json'},
        body: JSON.stringify({date, full})
      });
      const j = await r.json();
      if(r.ok) {
        statusInfo.innerText = '✅ 分析已完成！';
        setTimeout(()=>statusInfo.style.display='none', 2000);
        render(j.result || {});
      } else { alert(j.detail || '生成失败'); statusInfo.style.display='none'; }
    } catch (err) { statusInfo.style.display='none'; }
  }

  async function saveMorningDiary(){
    if(!currentViewDate) return;
    saveMorningBtn.innerText = '💾 保存中...';
    try {
      const r = await fetch('/reflection', {
        method: 'POST',
        headers: {'Authorization':`Bearer ${token}`, 'Content-Type':'application/json'},
        body: JSON.stringify({date: currentViewDate, text: morningDiaryText.value})
      });
      if(r.ok) {
        saveMorningBtn.innerText = '✨ 已存档';
        setTimeout(() => saveMorningBtn.innerText = '保存晨间日记', 2000);
      } else { alert('保存失败'); }
    } catch (err) { alert('系统错误'); }
  }

  async function saveEveningDiary(){
    if(!currentViewDate) return;
    saveEveningBtn.innerText = '💾 保存中...';
    try {
      const r = await fetch('/evening_diary', {
        method: 'POST',
        headers: {'Authorization':`Bearer ${token}`, 'Content-Type':'application/json'},
        body: JSON.stringify({date: currentViewDate, text: eveningDiaryText.value})
      });
      if(r.ok) {
        saveEveningBtn.innerText = '✨ 已存档';
        setTimeout(() => saveEveningBtn.innerText = '保存晚间复盘', 2000);
      } else { alert('保存失败'); }
    } catch (err) { alert('系统错误'); }
  }

  init();
</script></body></html>
