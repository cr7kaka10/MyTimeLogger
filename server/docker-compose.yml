version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://root:rootpassword@db:3306/mytimelogger}
      - SECRET_KEY=${SECRET_KEY:-default-secret-key}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    depends_on:
      - db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-mytimelogger}
    command: >
      --innodb-buffer-pool-size=64M
      --max-connections=20
      --performance-schema=OFF
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'

volumes:
  mysql_data:
