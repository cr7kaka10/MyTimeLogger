services:
  sleep-server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: mytimelogger-sleep-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYTIMELOGGER_SERVER_MODE: "1"
      SERVER_RUNTIME_OVERWRITE: "1"
      SERVER_SLEEP_DB_PATH: /app/server/data/server_sleep_jobs.db
    ports:
      - "${SLEEP_SERVER_PORT:-8000}:8000"
    volumes:
      - ./data:/app/server/data
      - ./attachments:/app/server/attachments
      - ./reports:/app/reports
      - ./log:/app/log
